server {
	listen       80;
	server_name  default_server;
	location / {
		root   /usr/share/nginx/html;
		index  index.html index.htm;
	}
	location /mysqlmanager {
		root /usr/share/;
		index index.php index.html index.htm;
		location ~ ^/mysqlmanager/(.+\.php)$ {
		try_files $uri =404;
		root /usr/share/;
		fastcgi_pass 127.0.0.1:9000;
		fastcgi_index index.php;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		include /etc/nginx/fastcgi_params;
	}
	location ~* ^/mysqlmanager/(.+\.(jpg|jpeg|gif|css|png|js|ico|html|xml|txt))$ {
		root /usr/share/;
		}
	}
	location /cPanel {
		root /usr/share/;
		index index.php index.html;
	location ~ ^/cPanel/(.+\.php)$ {
		try_files $uri =404;
		root /usr/share/;
		fastcgi_pass 127.0.0.1:9009;
		fastcgi_index index.php;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		include /etc/nginx/fastcgi_params;
	}
	location ~* ^/cPanel/(.+\.(jpg|jpeg|gif|css|png|js|ico|html|xml|txt))$ {
		root /usr/share/;
		}
	}
	location /filerun {
		root /usr/share/;
		index index.php index.html index.htm;
	location ~ ^/filerun/(.+\.php)$ {
		try_files $uri =404;
		root /usr/share/;
		fastcgi_pass 127.0.0.1:9000;
		fastcgi_index index.php;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		include /etc/nginx/fastcgi_params;
        }
	location ~* ^/filerun/(.+\.(jpg|jpeg|gif|css|png|js|ico|html|xml|txt))$ {
		root /usr/share/;
        }
}
	location ~ [^/]\.php(/|$) {
		fastcgi_split_path_info ^(.+?\.php)(/.*)$;
		if (!-f $document_root$fastcgi_script_name) {
		return 404;
		}
		fastcgi_pass 127.0.0.1:9001;
		fastcgi_index index.php;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		include fastcgi_params;
		fastcgi_buffers 256 128k;
		fastcgi_buffer_size 128k;
		fastcgi_intercept_errors on;
		fastcgi_read_timeout 120s;
	}

		error_page   500 502 503 504  /50x.html;
		location = /50x.html {
		root   /usr/share/nginx/html;
	}

	location ~ /\.ht {
		deny  all;
	}
}
